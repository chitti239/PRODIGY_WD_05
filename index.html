<!DOCTYPE html>

<html lang="en">

<head>

```
<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>🌦 WeatherSphere</title>

<link
    rel="stylesheet"
    href="style.css">

<link
    rel="preconnect"
    href="https://fonts.googleapis.com">

<link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

<link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
```

</head>

<body>

```
<!-- Floating Background Effects -->

<div class="bg bg1"></div>
<div class="bg bg2"></div>

<main class="container">

    <!-- Header -->

    <header>

        <h1>🌦 WeatherSphere</h1>

        <p>Real-Time Weather Dashboard</p>

    </header>

    <!-- Search Area -->

    <section class="search-area">

        <div class="search-box">

            <input
                type="text"
                id="cityInput"
                placeholder="Search city..."
                aria-label="Search city">

            <button
                type="button"
                onclick="getWeatherByCity()">

                Search

            </button>

        </div>

        <button
            type="button"
            class="location-btn"
            onclick="getLocationWeather()">

            📍 Use My Location

        </button>

    </section>

    <!-- Current Weather Card -->

    <section
        id="weatherCard"
        class="weather-card hidden">

        <div class="top">

            <div class="weather-info">

                <h2 id="city"></h2>

                <p id="country"></p>

                <p id="description"></p>

            </div>

            <img
                id="weatherIcon"
                src=""
                alt="Weather Icon"
                width="120"
                height="120">

        </div>

        <!-- Temperature -->

        <div class="temp-box">

            <h1 id="temperature"></h1>

            <p id="feelsLike"></p>

        </div>

        <!-- Weather Details -->

        <div class="details">

            <div class="card">
                <h4>Humidity</h4>
                <p id="humidity"></p>
            </div>

            <div class="card">
                <h4>Wind</h4>
                <p id="wind"></p>
            </div>

            <div class="card">
                <h4>Pressure</h4>
                <p id="pressure"></p>
            </div>

            <div class="card">
                <h4>Visibility</h4>
                <p id="visibility"></p>
            </div>

            <div class="card">
                <h4>Sunrise</h4>
                <p id="sunrise"></p>
            </div>

            <div class="card">
                <h4>Sunset</h4>
                <p id="sunset"></p>
            </div>

            <div class="card">
                <h4>AQI</h4>
                <p id="aqi"></p>
            </div>

        </div>

    </section>

    <!-- 5-Day Forecast -->

    <section
        id="forecastSection"
        class="forecast-section">

        <div class="forecast-wrapper">

            <div class="forecast-header">

                <h2>📅 5-Day Forecast</h2>

                <p>
                    Upcoming weather predictions
                </p>

            </div>

            <div
                id="forecastContainer"
                class="forecast-container">

                <!-- Forecast cards generated by JavaScript -->

            </div>

        </div>

    </section>

</main>

<script src="script.js"></script>
```

</body>

</html>
